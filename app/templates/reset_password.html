<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña — NANO2026</title>
    <meta name="robots" content="noindex,nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow w-full max-w-sm">
        <div class="text-center mb-6">
            <a href="/" class="text-2xl font-black tracking-tight text-gray-900">
                NANO<span class="text-teal-500">2026</span>
            </a>
            <p class="text-gray-400 text-sm mt-1">
                {% if force_change %}
                    Cambio obligatorio de contraseña
                {% else %}
                    Definir nueva contraseña
                {% endif %}
            </p>
        </div>
        {% if error %}
            <p class="text-red-500 text-sm mb-4 text-center">{{ error }}</p>
        {% endif %}
        {% if force_change %}
            <p class="text-sm text-gray-600 mb-4 text-center">
                Antes de entrar al panel tenés que definir una nueva contraseña.
            </p>
        {% endif %}
        <form method="post" action="{% if force_change %}/force-password-change{% else %}/reset-password/{{ token }}{% endif %}">
            <label class="block text-sm font-medium mb-1">Nueva contraseña</label>
            <input type="password" name="password" required minlength="8"
                class="w-full border rounded-xl px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-400"/>
            <label class="block text-sm font-medium mb-1">Repetir contraseña</label>
            <input type="password" name="password_confirm" required minlength="8"
                class="w-full border rounded-xl px-3 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-teal-400"/>
            <button type="submit"
                class="w-full bg-teal-500 hover:bg-teal-400 text-white py-2 rounded-full transition font-semibold">
                Guardar contraseña
            </button>
        </form>
    </div>
</body>
</html>
