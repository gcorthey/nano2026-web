<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — NANO2026</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="/static/css/tailwind.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-800 text-white px-6 py-3 sticky top-0 z-50 shadow">
        <div class="flex items-center justify-between">
            <span class="font-bold text-lg">Panel Admin</span>
            <!-- Desktop -->
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/admin" class="hover:underline">Resúmenes</a>
                <a href="/admin/programa" class="hover:underline">Programa</a>
                <a href="/admin/evaluadores" class="hover:underline">Usuarios</a>
                <a href="/logout" class="hover:underline text-red-300">Salir</a>
            </div>
            <!-- Hamburger -->
            <button id="menu-btn" class="md:hidden text-white focus:outline-none">
                <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden mt-3 flex flex-col gap-3 text-sm pb-2">
            <a href="/admin" class="hover:underline">Resúmenes</a>
            <a href="/admin/programa" class="hover:underline">Programa</a>
            <a href="/admin/evaluadores" class="hover:underline">Usuarios</a>
            <a href="/logout" class="hover:underline text-red-300">Salir</a>
        </div>
    </nav>

    <div class="w-full px-4 py-6">
        {% block content %}{% endblock %}
    </div>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        const iconOpen = document.getElementById('icon-open');
        const iconClose = document.getElementById('icon-close');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            iconOpen.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });
    </script>

</body>
</html>
