<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            margin: 2.5cm;
            color: #000;
        }
        h1 {
            font-size: 14pt;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.5cm;
        }
        .autor {
            text-align: center;
            font-size: 11pt;
            margin-bottom: 0.2cm;
        }
        .afiliacion {
            text-align: center;
            font-size: 10pt;
            color: #444;
            margin-bottom: 0.8cm;
        }
        .email {
            text-align: center;
            font-size: 10pt;
            color: #444;
            margin-bottom: 1cm;
        }
        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin-bottom: 1cm;
        }
        .contenido {
            text-align: justify;
            line-height: 1.6;
        }
        .footer {
            position: fixed;
            bottom: 1cm;
            left: 2.5cm;
            right: 2.5cm;
            text-align: center;
            font-size: 9pt;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 0.3cm;
        }
    </style>
</head>
<body>
    <h1>{{ abstract.titulo }}</h1>
    <p class="autor">{{ abstract.autor }}</p>
    <p class="afiliacion">{{ abstract.afiliacion }}</p>
    <p class="email">{{ abstract.email_autor }}</p>
    <hr>
    <div class="contenido">
        {{ abstract.contenido_html | safe }}
    </div>
    <div class="footer">
        Congreso Nano 2025
    </div>
</body>
</html>
