<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANO2026 — XXIV Encuentro de Superficies y Materiales Nanoestructurados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-gray-900 text-white px-6 py-3 sticky top-0 z-50 shadow">
        <div class="flex items-center justify-between">
            <a href="/" class="font-black text-lg tracking-tight">
                NANO<span class="text-teal-400">2026</span>
            </a>
            <!-- Desktop menu -->
            <div class="hidden md:flex gap-5 text-sm text-gray-300">
                <a href="/" class="hover:text-white transition">Inicio</a>
                <a href="/abstracts" class="hover:text-white transition">Resúmenes</a>
                <a href="/programa" class="hover:text-white transition">Programa</a>
                <a href="/speakers" class="hover:text-white transition">Speakers</a>
                <a href="/venue" class="hover:text-white transition">Venue</a>
                <a href="/submit" class="bg-teal-500 hover:bg-teal-400 text-white px-4 py-1.5 rounded-full transition font-medium">
                    Enviar resumen
                </a>
            </div>
            <!-- Hamburger -->
            <button id="menu-btn" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
                <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden mt-3 flex flex-col gap-3 text-sm text-gray-300 pb-2">
            <a href="/" class="hover:text-white transition">Inicio</a>
            <a href="/abstracts" class="hover:text-white transition">Resúmenes</a>
            <a href="/programa" class="hover:text-white transition">Programa</a>
            <a href="/speakers" class="hover:text-white transition">Speakers</a>
            <a href="/venue" class="hover:text-white transition">Venue</a>
            <a href="/submit" class="bg-teal-500 hover:bg-teal-400 text-white px-4 py-2 rounded-full transition font-medium text-center">
                Enviar resumen
            </a>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto py-8 px-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-gray-900 text-gray-400 text-center text-xs py-6 mt-12">
        <p class="font-semibold text-white mb-1">NANO2026 — XXIV Encuentro de Superficies y Materiales Nanoestructurados</p>
        <p>3, 4 y 5 de junio de 2026 · Campus UNSAM · San Martín, Buenos Aires</p>
    </footer>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        const iconOpen = document.getElementById('icon-open');
        const iconClose = document.getElementById('icon-close');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            iconOpen.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        });
    </script>
</body>
</html>
