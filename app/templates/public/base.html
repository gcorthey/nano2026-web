<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NANO2026 — XXIV Encuentro de Superficies y Materiales Nanoestructurados</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-gray-900 text-white px-6 py-3 flex items-center justify-between sticky top-0 z-50 shadow">
        <a href="/" class="font-black text-lg tracking-tight">
            NANO<span class="text-teal-400">2026</span>
        </a>
        <div class="flex gap-5 text-sm text-gray-300">
            <a href="/" class="hover:text-white transition">Inicio</a>
            <a href="/abstracts" class="hover:text-white transition">Resúmenes</a>
            <a href="/programa" class="hover:text-white transition">Programa</a>
            <a href="/speakers" class="hover:text-white transition">Speakers</a>
            <a href="/venue" class="hover:text-white transition">Venue</a>
            <a href="/submit" class="bg-teal-500 hover:bg-teal-400 text-white px-4 py-1.5 rounded-full transition font-medium">
                Enviar resumen
            </a>
        </div>
    </nav>
    <div class="max-w-5xl mx-auto py-8 px-4">
        {% block content %}{% endblock %}
    </div>
    <footer class="bg-gray-900 text-gray-400 text-center text-xs py-6 mt-12">
        <p class="font-semibold text-white mb-1">NANO2026 — XXIV Encuentro de Superficies y Materiales Nanoestructurados</p>
        <p>3, 4 y 5 de junio de 2026 · Campus UNSAM · San Martín, Buenos Aires</p>
    </footer>
</body>
</html>
