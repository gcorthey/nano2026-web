{% extends "public/base.html" %}
{% block content %}

<a href="/abstracts" class="text-blue-600 text-sm hover:underline">← Volver a resúmenes</a>

<div class="mt-4 bg-white rounded shadow p-8">
    <div class="flex items-start justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-blue-900">{{ abstract.titulo }}</h1>
            <p class="text-gray-600 mt-2">{{ abstract.autor }}</p>
            <p class="text-gray-400 text-sm">{{ abstract.afiliacion }}</p>
        </div>
        <a href="/abstracts/{{ abstract.id }}/pdf" target="_blank"
            class="bg-gray-100 text-gray-600 px-4 py-2 rounded hover:bg-gray-200 text-sm whitespace-nowrap">
            📄 Descargar PDF
        </a>
    </div>

    <div class="prose max-w-none border-t pt-6">
        {{ abstract.contenido_html | safe }}
    </div>
</div>

{% endblock %}
