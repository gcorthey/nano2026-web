{% extends "eval/base.html" %}
{% block content %}

<a href="/eval" class="text-teal-600 text-sm hover:underline">← Volver a la lista</a>

<div class="mt-4 bg-white rounded shadow p-6 mb-6">
    <h1 class="text-xl font-bold">{{ abstract.titulo }}</h1>
    <p class="text-gray-500 text-sm mt-1">{{ abstract.autor }} — {{ abstract.afiliacion }}</p>

    <div class="prose max-w-none border rounded p-4 bg-gray-50 mt-4">
        {{ abstract.contenido_html | safe }}
    </div>
</div>

<!-- Formulario de review -->
<div class="bg-white rounded shadow p-6">
    <h2 class="font-semibold mb-4">Tu evaluación</h2>

    {% if success %}
        <div class="bg-green-100 border border-green-400 text-green-800 px-4 py-3 rounded mb-4">
            ✅ Evaluación guardada correctamente.
        </div>
    {% endif %}

    <form method="post" action="/eval/{{ abstract.id }}">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Decisión *</label>
            <div class="flex gap-4">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="decision" value="aprobado" required
                        {% if review and review.decision and review.decision.value == 'aprobado' %}checked{% endif %}>
                    <span class="text-green-700 font-medium">Aprobar</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="decision" value="rechazado"
                        {% if review and review.decision and review.decision.value == 'rechazado' %}checked{% endif %}>
                    <span class="text-red-700 font-medium">Rechazar</span>
                </label>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Comentario</label>
            <textarea name="comentario" rows="4" placeholder="Comentarios para el autor o el comité..."
                class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-400 text-sm">{% if review %}{{ review.comentario or '' }}{% endif %}</textarea>
        </div>

        <button class="bg-teal-600 text-white px-6 py-2 rounded hover:bg-teal-700 text-sm font-medium">
            Guardar evaluación
        </button>
    </form>
</div>

{% endblock %}
