<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login — Congreso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded shadow w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-6 text-center">Acceso al sistema</h1>
        {% if error %}
            <p class="text-red-500 text-sm mb-4 text-center">{{ error }}</p>
        {% endif %}
        <form method="post" action="/login">
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full border rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            <label class="block text-sm font-medium mb-1">Contraseña</label>
            <input type="password" name="password" required
                class="w-full border rounded px-3 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                Entrar
            </button>
        </form>
    </div>
</body>
</html>
